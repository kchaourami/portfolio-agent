name: portfolio_agent
version: "1.0.0"
config-version: 2

profile: portfolio_agent   # doit correspondre à profiles.yml

model-paths: ["models"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  portfolio_agent:
    staging:
      +materialized: view       # staging = vues légères, pas de stockage
      +schema: staging
    marts:
      +materialized: table      # marts = tables persistées, lues par les agents
      +schema: marts